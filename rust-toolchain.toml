# Single source of truth for the Rust toolchain.
# Read by:
#   - rust-overlay (in flake.nix)            -> Nix dev shell
#   - rustup (on non-Nix hosts / CI)         -> same version, no drift
[toolchain]
channel = "stable"
components = ["rustfmt", "clippy", "rust-src"]
# Pre-install the wasm target so the future web client has nothing extra to fetch.
targets = ["wasm32-unknown-unknown"]
profile = "default"
